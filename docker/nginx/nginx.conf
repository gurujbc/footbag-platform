# =============================================================================
# Footbag Platform — nginx reverse proxy
# Receives traffic from the host (or CloudFront origin), proxies to the
# Node.js web container on port 3000.
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/html text/javascript
        application/javascript application/json
        application/xml+rss image/svg+xml;

    # ── Upstream ──────────────────────────────────────────────────────────────
    # "web" resolves to the web service via Docker Compose internal DNS.
    upstream app {
        server web:3000;
        keepalive 16;
    }

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # real_ip directives intentionally omitted.
        # Direct-to-origin HTTP is not yet blocked (see Path E, section 5.3).
        # set_real_ip_from 0.0.0.0/0 allows any caller to spoof $remote_addr via X-Forwarded-For.
        # Re-add with an explicit CloudFront IP range once origin-bypass protection is enforced.

        # ── Health probes (pass through, no buffering) ─────────────────────
        location /health/ {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 5s;
            access_log off;
        }

        # ── All other requests ─────────────────────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_buffer_size         16k;
            proxy_buffers             8 16k;
            proxy_busy_buffers_size   32k;
        }
    }
}
