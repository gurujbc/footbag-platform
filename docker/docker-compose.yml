# =============================================================================
# Footbag Platform — Local development / parity stack
#
# Usage:
#   # First-time setup: build the local DB (requires sqlite3 CLI or use Node):
#   ./scripts/reset-local-db.sh
#
#   # Start the stack:
#   docker compose up --build
#
#   # Smoke check (requires the stack to be running):
#   ./scripts/smoke-local.sh
#
# The SQLite database file is mounted from the host so you can inspect it
# directly with the sqlite3 CLI or DB Browser for SQLite.
# =============================================================================

services:

  # ── nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  # ── Node.js web application ───────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: info
      FOOTBAG_DB_PATH: /app/footbag.db
      PUBLIC_BASE_URL: http://localhost
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      # Mount the local seed DB into the container read-write.
      # The app applies SQLite startup pragmas, so must be able to write..
      - ../database/footbag.db:/app/footbag.db:rw
      # Local media uploads (avatars, photos).
      - ../data/media:/app/data/media:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/live"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Background worker ─────────────────────────────────────────────────────
  # MVFP v0.1: exits immediately (no jobs configured yet).
  # Will become a long-running process once job processing is implemented.
  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      FOOTBAG_DB_PATH: /app/footbag.db
    volumes:
      - ../database/footbag.db:/app/footbag.db:rw
    restart: "no"
