# =============================================================================
# Footbag Platform — Production overrides
#
# Applied on top of docker-compose.yml on the Lightsail host:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# Key differences from local dev:
#   - restart: always on nginx and web; worker intentionally restart: "no" (stub in v0.1)
#   - Explicit memory limits to prevent OOM runaway
#   - DB volume path from env (not a hardcoded local path)
#   - No host port binding for web — traffic flows through nginx only
#   - Secrets and config injected from host environment / SSM at deploy time
# =============================================================================

services:

  nginx:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

  web:
    restart: always
    volumes:
      # Production DB is managed on the host; path comes from env at deploy time.
      # The host operator sets FOOTBAG_DB_PATH in the systemd environment file
      # or passes it via `docker compose --env-file`.
      - ${FOOTBAG_DB_PATH:-/srv/footbag/footbag.db}:/app/footbag.db:rw
      # Media uploads (avatars, photos). Persisted on host across deploys.
      - ${FOOTBAG_MEDIA_DIR:-/srv/footbag/media}:/app/data/media:rw
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    # MVFP v0.1: the worker is a stub that exits immediately (no jobs configured).
    # restart: always is intentionally NOT set here. The base docker-compose.yml
    # sets restart: "no" and this override must not change that.
    # When real background jobs are added, change this to: restart: unless-stopped
    restart: "no"
    volumes:
      - ${FOOTBAG_DB_PATH:-/srv/footbag/footbag.db}:/app/footbag.db:rw
    deploy:
      resources:
        limits:
          memory: 128M
